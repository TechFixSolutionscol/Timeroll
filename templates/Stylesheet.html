    - Time Tracking: Goal: Inform & Control. Method: A large digital display for the timer with clear Start/Pause/Stop controls on the 'Dashboard'. Interaction: Buttons change state and functionality (e.g., Start -> Pause), providing clear visual feedback on the current timer status. Justification: Universally understood controls for a primary user task. Library: Vanilla JS.

    - Dark Mode Toggle: Goal: Customization. Method: A button in the sidebar to switch themes. Interaction: Toggles a 'dark' class on the root HTML element, applying Tailwind's dark mode variants. Justification: Enhances user comfort and personalization. Library: Vanilla JS + Tailwind.
