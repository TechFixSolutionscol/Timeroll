<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBill Pro - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
    </style>
</head>
<body class="bg-[#F8F7F4] dark:bg-zinc-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform transition-transform duration-300 dark:bg-zinc-700">
        <h2 class="text-2xl font-bold text-indigo-800 dark:text-indigo-300 mb-4">Bienvenido a TimeBill Pro</h2>
        <p class="text-gray-600 dark:text-zinc-300 mb-8">Inicia sesión para gestionar tu tiempo y facturación.</p>
        <form id="login-form">
            <div class="mb-4 text-left">
                <label for="username" class="block text-sm font-medium text-gray-700 dark:text-zinc-200">Usuario</label>
                <input type="text" id="username" value="admin" class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6 text-left">
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-zinc-200">Contraseña</label>
                <input type="password" id="password" value="admin" class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" id="login-button" class="w-full bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-indigo-700 transition-transform transform hover:scale-105">
                Ingresar
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 h-4"></p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('login-button');
            const errorMessage = document.getElementById('login-error');

            loginButton.disabled = true;
            loginButton.textContent = 'Ingresando...';
            errorMessage.textContent = '';

            google.script.run
                .withSuccessHandler(response => {
                    if (response.success) {
                        window.top.location.href = response.redirectUrl;
                    } else {
                        errorMessage.textContent = response.message || 'Usuario o contraseña incorrectos.';
                        loginButton.disabled = false;
                        loginButton.textContent = 'Ingresar';
                    }
                })
                .withFailureHandler(error => {
                    errorMessage.textContent = 'Ocurrió un error: ' + error.message;
                    loginButton.disabled = false;
                    loginButton.textContent = 'Ingresar';
                })
                .doLogin(username, password);
        });
    </script>
</body>
</html>
