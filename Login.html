<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <title>Login - TimeBill Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-indigo-800">TimeBill Pro</h1>
            <p class="text-gray-600">Bienvenido de nuevo</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="text-sm font-bold text-gray-600 block">Usuario</label>
                <input type="text" id="username" name="username" required
                       class="w-full p-3 mt-1 text-gray-800 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label for="password" class="text-sm font-bold text-gray-600 block">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full p-3 mt-1 text-gray-800 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <button type="submit" id="submit-button"
                        class="w-full flex justify-center bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105 disabled:bg-indigo-400">
                    <span id="button-text">Ingresar</span>
                    <div id="spinner" class="spinner hidden"></div>
                </button>
            </div>
        </form>
        <div id="error-message" class="text-center text-red-500 text-sm"></div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitButton = document.getElementById('submit-button');
            const buttonText = document.getElementById('button-text');
            const spinner = document.getElementById('spinner');
            const errorMessage = document.getElementById('error-message');

            // Disable button and show spinner
            submitButton.disabled = true;
            buttonText.classList.add('hidden');
            spinner.classList.remove('hidden');
            errorMessage.textContent = '';

            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        // On successful login, reload the page. The server-side
                        // doGet will now serve the main application.
                        window.location.reload();
                    } else {
                        errorMessage.textContent = response.message || 'Login failed.';
                        // Re-enable button
                        submitButton.disabled = false;
                        buttonText.classList.remove('hidden');
                        spinner.classList.add('hidden');
                    }
                })
                .withFailureHandler(function(error) {
                    errorMessage.textContent = 'An error occurred: ' + error.message;
                    // Re-enable button
                    submitButton.disabled = false;
                    buttonText.classList.remove('hidden');
                    spinner.classList.add('hidden');
                })
                .login(username, password);
        });
    </script>
</body>
</html>
