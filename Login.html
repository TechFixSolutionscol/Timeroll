<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TimeBill Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <?!= include('Stylesheet'); ?>
</head>
<body class="bg-[#F8F7F4] text-[#2D3748] dark:bg-zinc-900 dark:text-zinc-100 flex items-center justify-center min-h-screen">

    <div id="login-modal" class="modal-backdrop flex items-center justify-center p-4">
        <div class="modal-content bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform scale-100 dark:bg-zinc-700">
            <h2 class="text-2xl font-bold text-indigo-800 dark:text-indigo-300 mb-4">Bienvenido a TimeBill Pro</h2>
            <p class="text-gray-600 dark:text-zinc-300 mb-8">Inicia sesión para gestionar tu tiempo y facturación.</p>
            <form id="login-form">
                <div class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-zinc-200 text-left">Usuario</label>
                        <input type="text" id="username" required class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-zinc-200 text-left">Contraseña</label>
                        <input type="password" id="password" required class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div id="error-message" class="text-red-500 mt-4 h-4"></div>
                <button type="submit" id="login-button" class="w-full mt-4 bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-indigo-700 transition-transform transform hover:scale-105">
                    Ingresar
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const loginButton = document.getElementById('login-button');

            loginButton.disabled = true;
            loginButton.textContent = 'Ingresando...';
            errorMessage.textContent = '';

            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        window.top.location.reload();
                    } else {
                        errorMessage.textContent = response.message;
                        loginButton.disabled = false;
                        loginButton.textContent = 'Ingresar';
                    }
                })
                .withFailureHandler(function(error) {
                    errorMessage.textContent = 'An unexpected error occurred.';
                    console.error(error);
                    loginButton.disabled = false;
                    loginButton.textContent = 'Ingresar';
                })
                .login(username, password);
        });
    </script>
</body>
</html>
