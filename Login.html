<!DOCTYPE html>
<html lang="es">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBill Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <?!= include('Stylesheet'); ?>
</head>
<body class="bg-[#F8F7F4] text-[#2D3748] dark:bg-zinc-900 dark:text-zinc-100 flex items-center justify-center min-h-screen">

    <!-- Login Modal -->
    <div id="login-modal" class="modal-backdrop">
        <div class="modal-content bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform scale-100 dark:bg-zinc-700">
            <div class="mb-8 flex justify-center">
                 <img src="https://i.imgur.com/Pfy2d5A.jpeg" alt="TimeBill Pro Logo" class="h-28 w-auto rounded-2xl shadow-lg bg-white dark:bg-zinc-700 p-2">
            </div>
            <h2 class="text-2xl font-bold text-indigo-800 dark:text-indigo-300 mb-4">Bienvenido a TimeBill Pro</h2>
            <p id="login-message" class="text-gray-600 dark:text-zinc-300 mb-8">Inicia sesión para gestionar tu tiempo y facturación.</p>

            <form id="login-form">
                <div class="space-y-4 text-left">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-zinc-200">Usuario</label>
                        <input type="text" id="username" required class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-zinc-200">Contraseña</label>
                        <input type="password" id="password" required class="mt-1 w-full p-3 border border-gray-300 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="mt-8">
                    <button type="submit" id="login-button" class="w-full bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-indigo-700 transition-transform transform hover:scale-105 flex items-center justify-center">
                        <span id="login-spinner" class="spinner hidden mr-2"></span>
                        Ingresar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const loginSpinner = document.getElementById('login-spinner');
        const loginMessage = document.getElementById('login-message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            loginButton.disabled = true;
            loginSpinner.classList.remove('hidden');
            loginMessage.textContent = 'Verificando credenciales...';
            loginMessage.classList.remove('text-red-500');

            const username = usernameInput.value;
            const password = passwordInput.value;

            google.script.run
                .withSuccessHandler(handleLoginSuccess)
                .withFailureHandler(handleLoginFailure)
                .login(username, password);
        });

        function handleLoginSuccess(response) {
            if (response.success) {
                loginMessage.textContent = '¡Éxito! Redirigiendo...';
                // On success, the doGet will serve the main app page
                window.location.reload();
            } else {
                handleLoginFailure({ message: response.message });
            }
        }

        function handleLoginFailure(error) {
            loginMessage.textContent = error.message || 'Ocurrió un error inesperado.';
            loginMessage.classList.add('text-red-500');
            loginButton.disabled = false;
            loginSpinner.classList.add('hidden');
        }
    </script>
</body>
</html>
