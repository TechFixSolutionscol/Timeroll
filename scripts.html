<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- UTILITY FUNCTIONS ---
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);

    // --- GLOBAL STATE ---
    let appState = {
        currentUser: null,
        clients: [],
        timer: {
            interval: null,
            startTime: 0,
            elapsedTime: 0,
            isRunning: false,
            isPaused: false,
        },
        activeView: 'dashboard'
    };

    // --- ELEMENT SELECTORS ---
    const elements = {
        // Setup & Auth
        setupContainer: $('#setup-container'),
        setupButton: $('#setup-button'),
        authModal: $('#auth-modal'),
        loginView: $('#login-view'),
        registerView: $('#register-view'),
        loginForm: $('#login-form'),
        registerForm: $('#register-form'),
        showRegisterLink: $('#show-register'),
        showLoginLink: $('#show-login'),
        appContainer: $('#app-container'),
        logoutButton: $('#logout-button'),
        userDisplay: $('#user-display'),

        // Navigation
        navItems: $$('.nav-item'),
        pages: $$('.page'),

        // Timer
        timerDisplay: $('#timer-display'),
        clientSelect: $('#client-select'),
        hourlyRate: $('#hourly-rate'),
        startPauseButton: $('#start-pause-button'),
        stopButton: $('#stop-button'),

        // Clients
        clientsTableBody: $('#clients-table-body'),
        addClientButton: $('#add-client-button'),
        noClientsMessage: $('#no-clients-message'),

        // Client Modal
        clientModal: $('#client-modal'),
        clientModalTitle: $('#client-modal-title'),
        clientForm: $('#client-form'),
        clientIdInput: $('#client-id'),
        cancelClientModal: $('#cancel-client-modal'),

        // Invoice Modal
        invoiceModal: $('#invoice-modal'),
        invoiceContent: $('#invoice-content'),
        sendInvoiceButton: $('#send-invoice-button'),

        // Misc
        toast: $('#toast-notification'),
        toastMessage: $('#toast-message'),
        darkModeToggle: $('#dark-mode-toggle'),
    };

    // This variable is passed from the server-side template
    const isInitialized = <?!= isInitialized ?>;

    // --- INITIALIZATION ---
    function init() {
        if (!isInitialized) {
            elements.setupContainer.classList.remove('hidden');
            elements.authModal.classList.add('hidden');
            elements.appContainer.classList.add('hidden');
        } else {
            elements.setupContainer.classList.add('hidden');
            google.script.run.withSuccessHandler(handleAuthResponse).checkAuth();
        }
        addEventListeners();
        initTheme();
    }

    // --- EVENT LISTENERS ---
    function addEventListeners() {
        if (elements.setupButton) {
            elements.setupButton.addEventListener('click', handleSetup);
        }
        elements.showRegisterLink.addEventListener('click', showRegisterView);
        elements.showLoginLink.addEventListener('click', showLoginView);
        elements.loginForm.addEventListener('submit', handleLogin);
        elements.registerForm.addEventListener('submit', handleRegister);
        elements.logoutButton.addEventListener('click', handleLogout);
        elements.darkModeToggle.addEventListener('click', toggleDarkMode);

        elements.navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const viewId = e.currentTarget.getAttribute('href').substring(1);
                switchView(viewId);
            });
        });

        // Client Management
        elements.addClientButton.addEventListener('click', () => toggleClientModal(true));
        elements.cancelClientModal.addEventListener('click', () => toggleClientModal(false));
        elements.clientForm.addEventListener('submit', handleClientFormSubmit);
        elements.clientsTableBody.addEventListener('click', handleClientsTableClick);

        // Timer
        elements.startPauseButton.addEventListener('click', handleStartPause);
        elements.stopButton.addEventListener('click', stopTimer);
        elements.sendInvoiceButton.addEventListener('click', () => toggleInvoiceModal(false));
    }

    // --- UI & THEME FUNCTIONS ---
    function showToast(message, isError = false) {
        elements.toastMessage.textContent = message;
        elements.toast.className = `fixed bottom-10 right-10 text-white py-3 px-6 rounded-lg shadow-xl text-lg opacity-0 translate-y-4 transition-all duration-500 ${isError ? 'bg-red-500' : 'bg-green-500'}`;
        elements.toast.classList.remove('opacity-0', 'translate-y-4');
        setTimeout(() => {
            elements.toast.classList.add('opacity-0', 'translate-y-4');
        }, 3000);
    }

    function initTheme() {
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            elements.darkModeToggle.textContent = 'Modo Claro ☀️';
        } else {
            document.documentElement.classList.remove('dark');
            elements.darkModeToggle.textContent = 'Modo Oscuro 🌙';
        }
    }

    function toggleDarkMode() {
        if (document.documentElement.classList.toggle('dark')) {
            localStorage.setItem('theme', 'dark');
            elements.darkModeToggle.textContent = 'Modo Claro ☀️';
        } else {
            localStorage.setItem('theme', 'light');
            elements.darkModeToggle.textContent = 'Modo Oscuro 🌙';
        }
    }

    function switchView(viewId) {
        appState.activeView = viewId;
        elements.pages.forEach(page => page.classList.add('hidden'));
        $(`#page-${viewId}`).classList.remove('hidden');
        elements.navItems.forEach(item => item.classList.remove('active'));
        $(`a[href="#${viewId}"]`).classList.add('active');
    }

    function renderClients() {
        elements.clientsTableBody.innerHTML = '';
        elements.clientSelect.innerHTML = '<option value="">Ningún cliente seleccionado</option>';

        if (appState.clients.length === 0) {
            elements.noClientsMessage.classList.remove('hidden');
        } else {
            elements.noClientsMessage.classList.add('hidden');
            appState.clients.forEach(client => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-gray-50 dark:hover:bg-zinc-600';
                tr.innerHTML = `
                    <td class="p-4 font-medium">${client.name}</td>
                    <td class="p-4">${client.email}</td>
                    <td class="p-4">${client.phone || 'N/A'}</td>
                    <td class="p-4">
                        <button class="edit-client-btn text-blue-600 hover:underline" data-id="${client.id}">Editar</button>
                        <button class="delete-client-btn text-red-600 hover:underline ml-4" data-id="${client.id}">Eliminar</button>
                    </td>
                `;
                elements.clientsTableBody.appendChild(tr);

                const option = document.createElement('option');
                option.value = client.id;
                option.textContent = client.name;
                elements.clientSelect.appendChild(option);
            });
        }
    }

    // --- MODAL TOGGLERS ---
    function toggleClientModal(show = false, client = null) {
        if (show) {
            elements.clientForm.reset();
            elements.clientModalTitle.textContent = client ? 'Editar Cliente' : 'Añadir Nuevo Cliente';
            if (client) {
                $('#client-id').value = client.id;
                $('#client-name').value = client.name;
                $('#client-email').value = client.email;
                $('#client-phone').value = client.phone;
                $('#client-address').value = client.address;
            }
            elements.clientModal.classList.remove('hidden');
        } else {
            elements.clientModal.classList.add('hidden');
        }
    }

    function toggleInvoiceModal(show = false, data = null) {
        if (show && data) {
            const { client, hours, rate, total } = data;
            elements.invoiceContent.innerHTML = `
                <p><strong>Cliente:</strong> ${client.name}</p>
                <p><strong>Duración:</strong> ${hours.toFixed(2)} horas</p>
                <p><strong>Tarifa:</strong> $${rate.toFixed(2)}/hora</p>
                <p class="text-xl font-bold mt-4"><strong>Total:</strong> $${total.toFixed(2)}</p>
            `;
            elements.invoiceModal.classList.remove('hidden');
        } else {
            elements.invoiceModal.classList.add('hidden');
        }
    }

    // --- SETUP & AUTH HANDLERS ---
    function handleSetup() {
        elements.setupButton.disabled = true;
        elements.setupButton.textContent = 'Configurando...';
        google.script.run
            .withSuccessHandler(response => {
                if (response.success) {
                    alert('¡Base de datos configurada con éxito! La aplicación se recargará.');
                    window.location.reload();
                } else {
                    alert('Error: ' + response.message);
                    elements.setupButton.disabled = false;
                    elements.setupButton.textContent = 'Configurar Base de Datos';
                }
            })
            .withFailureHandler(err => {
                alert('Error: ' + err.message);
                elements.setupButton.disabled = false;
            })
            .setup();
    }
    function showRegisterView(e) { e.preventDefault(); elements.loginView.classList.add('hidden'); elements.registerView.classList.remove('hidden'); }
    function showLoginView(e) { e.preventDefault(); elements.registerView.classList.add('hidden'); elements.loginView.classList.remove('hidden'); }

    function handleAuthResponse(response) {
        if (response && response.isAuthenticated) {
            appState.currentUser = response.user;
            elements.userDisplay.textContent = `Usuario: ${response.user.name}`;
            elements.authModal.classList.add('hidden');
            elements.appContainer.classList.remove('hidden');
            loadClients();
            switchView('dashboard');
        } else {
            appState.currentUser = null;
            elements.userDisplay.textContent = '';
            elements.authModal.classList.remove('hidden');
            elements.appContainer.classList.add('hidden');
        }
    }

    function handleLogin(e) { e.preventDefault(); google.script.run.withSuccessHandler(handleAuthResponse).loginUser($('#login-email').value, $('#login-password').value); }
    function handleRegister(e) {
        e.preventDefault();
        const name = $('#register-name').value;
        const email = $('#register-email').value;
        const password = $('#register-password').value;
        google.script.run
            .withSuccessHandler(response => {
                if(response.success) {
                    alert('Registro exitoso. Por favor inicie sesión.');
                    showLoginView();
                    elements.loginForm.reset();
                    elements.registerForm.reset();
                } else {
                    alert('Error de registro: ' + response.message);
                }
            })
            .withFailureHandler(err => alert('Error de registro: ' + err.message))
            .registerUser(name, email, password);
    }
    function handleLogout() { google.script.run.withSuccessHandler(() => window.location.reload()).logout(); }

    // --- CLIENT MANAGEMENT HANDLERS ---
    function loadClients() {
        google.script.run
            .withSuccessHandler(clients => {
                appState.clients = clients;
                renderClients();
            })
            .withFailureHandler(err => showToast(err.message, true))
            .getClients();
    }

    function handleClientFormSubmit(e) {
        e.preventDefault();
        const clientData = {
            id: $('#client-id').value,
            name: $('#client-name').value,
            email: $('#client-email').value,
            phone: $('#client-phone').value,
            address: $('#client-address').value,
        };

        const handler = (updatedClients) => {
            loadClients();
            toggleClientModal(false);
            showToast(`Cliente ${clientData.id ? 'actualizado' : 'añadido'} con éxito.`);
        };

        if (clientData.id) {
            google.script.run.withSuccessHandler(handler).withFailureHandler(err => showToast(err.message, true)).updateClient(clientData);
        } else {
            google.script.run.withSuccessHandler(handler).withFailureHandler(err => showToast(err.message, true)).addClient(clientData);
        }
    }

    function handleClientsTableClick(e) {
        const target = e.target;
        const clientId = target.dataset.id;
        if (!clientId) return;

        if (target.classList.contains('edit-client-btn')) {
            const client = appState.clients.find(c => c.id === clientId);
            if(client) toggleClientModal(true, client);
        }

        if (target.classList.contains('delete-client-btn')) {
            if (confirm('¿Estás seguro de que quieres eliminar este cliente?')) {
                google.script.run
                    .withSuccessHandler(() => {
                        showToast('Cliente eliminado.');
                        loadClients();
                    })
                    .withFailureHandler(err => showToast(err.message, true))
                    .deleteClient(clientId);
            }
        }
    }

    // --- TIMER LOGIC ---
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
        const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
        const s = String(totalSeconds % 60).padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function updateTimer() {
        const diff = Date.now() - appState.timer.startTime + appState.timer.elapsedTime;
        elements.timerDisplay.textContent = formatTime(diff);
    }

    function handleStartPause() {
        if (appState.timer.isRunning) { // PAUSE
            appState.timer.isPaused = true;
            appState.timer.isRunning = false;
            appState.timer.elapsedTime += Date.now() - appState.timer.startTime;
            clearInterval(appState.timer.interval);
            elements.startPauseButton.textContent = 'Reanudar';
        } else { // START or RESUME
            if (!elements.clientSelect.value || !elements.hourlyRate.value) {
                return showToast('Por favor, selecciona un cliente y define una tarifa.', true);
            }
            appState.timer.isRunning = true;
            appState.timer.isPaused = false;
            appState.timer.startTime = Date.now();
            appState.timer.interval = setInterval(updateTimer, 1000);
            elements.startPauseButton.textContent = 'Pausar';
            elements.stopButton.classList.remove('hidden');
            elements.clientSelect.disabled = true;
            elements.hourlyRate.disabled = true;
        }
    }

    function stopTimer() {
        if (!appState.timer.isRunning && !appState.timer.isPaused) return;

        const finalElapsedTime = appState.timer.elapsedTime + (appState.timer.isRunning ? (Date.now() - appState.timer.startTime) : 0);
        clearInterval(appState.timer.interval);

        const hours = finalElapsedTime / 3600000;
        const rate = parseFloat(elements.hourlyRate.value);
        const total = hours * rate;
        const client = appState.clients.find(c => c.id == elements.clientSelect.value);

        toggleInvoiceModal(true, { client, hours, rate, total });

        // Reset timer state
        appState.timer = { interval: null, startTime: 0, elapsedTime: 0, isRunning: false, isPaused: false };
        elements.timerDisplay.textContent = '00:00:00';
        elements.startPauseButton.textContent = 'Iniciar Sesión';
        elements.stopButton.classList.add('hidden');
        elements.clientSelect.disabled = false;
        elements.hourlyRate.disabled = false;
        elements.hourlyRate.value = '';
        elements.clientSelect.value = '';
    }

    init(); // Start the application
});
</script>
