<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBill Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Orbitron:wght@400;700&display=swap');
        .timer-font { font-family: 'Orbitron', sans-serif; }
        .modal-backdrop { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
        .nav-item.active { background-color: #4338CA; color: #F7FAFC; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #4F46E5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8F7F4] text-[#2D3748] dark:bg-zinc-900 dark:text-zinc-100">

    <div id="app-container" class="hidden md:flex min-h-screen">
        <aside class="w-64 bg-[#E9E7E2] p-6 flex flex-col dark:bg-zinc-800">
            <h1 class="text-2xl font-bold text-indigo-800 dark:text-indigo-300 mb-12">TimeBill Pro</h1>
            <nav class="flex flex-col space-y-2">
                <a href="#dashboard" class="nav-item">Panel de Control</a>
                <a href="#clients" class="nav-item">Clientes</a>
            </nav>
            <div class="mt-auto">
                <p id="username-display">Usuario: No identificado</p>
                <button id="dark-mode-toggle">Modo Oscuro</button>
                <button id="logout-button">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <div id="page-dashboard" class="page">
                <div class="bg-white p-8 rounded-2xl shadow-lg">
                    <div id="timer-display" class="timer-font text-8xl text-center">00:00:00</div>
                    <select id="client-select" class="w-full mt-4 p-2 border rounded"></select>
                    <input type="number" id="hourly-rate" placeholder="Valor por hora" class="w-full mt-2 p-2 border rounded">
                    <button id="start-pause-button" class="mt-4 bg-indigo-600 text-white p-3 rounded">Iniciar</button>
                    <button id="stop-button" class="mt-4 bg-red-600 text-white p-3 rounded hidden">Detener</button>
                </div>
            </div>
            <div id="page-clients" class="page hidden">
                <button id="add-client-button" class="bg-indigo-600 text-white p-2 rounded">+ Añadir Cliente</button>
                <table class="w-full mt-4">
                    <thead><tr><th>Nombre</th><th>Correo</th><th>Teléfono</th><th>Acciones</th></tr></thead>
                    <tbody id="clients-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="login-modal" class="modal-backdrop fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center">
        <div class="modal-content bg-white p-8 rounded-lg">
            <h2 class="text-2xl mb-4">Bienvenido</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuario" required class="w-full p-2 border rounded">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full mt-2 p-2 border rounded">
                <button type="submit" class="w-full mt-4 bg-indigo-600 text-white p-2 rounded">Ingresar</button>
            </form>
            <button id="setup-button" class="w-full mt-2 bg-gray-500 text-white p-2 rounded">Configurar Tablas</button>
        </div>
    </div>
    
    <div id="client-modal" class="hidden modal-backdrop fixed inset-0 bg-gray-800 bg-opacity-60 flex items-center justify-center">
        <div class="modal-content bg-white p-8 rounded-lg">
            <h2 id="client-modal-title">Añadir Cliente</h2>
            <form id="client-form">
                <input type="hidden" id="client-id">
                <input type="text" id="client-name" required class="w-full mt-2 p-2 border rounded">
                <input type="email" id="client-email" required class="w-full mt-2 p-2 border rounded">
                <input type="tel" id="client-phone" class="w-full mt-2 p-2 border rounded">
                <input type="text" id="client-address" class="w-full mt-2 p-2 border rounded">
                <button type="submit">Guardar</button>
                <button type="button" id="cancel-client-modal">Cancelar</button>
            </form>
        </div>
    </div>
    
    <div id="invoice-modal" class="hidden modal-backdrop fixed inset-0 bg-gray-800 bg-opacity-60 flex items-center justify-center">
      <div id="invoice-content" class="modal-content bg-white p-8 rounded-lg"></div>
    </div>

    <div id="toast-notification" class="fixed bottom-10 right-10 bg-green-500 text-white p-3 rounded opacity-0">
      <p id="toast-message"></p>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const SCRIPT_URL = "URL_DE_TU_APP_SCRIPT";

    const appState = {
        clients: [],
        timer: { interval: null, startTime: 0, elapsedTime: 0, isRunning: false, isPaused: false },
        currentUser: null,
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);

    const elements = {
        appContainer: $('#app-container'),
        loginModal: $('#login-modal'),
        loginForm: $('#login-form'),
        logoutButton: $('#logout-button'),
        usernameDisplay: $('#username-display'),
        navItems: $$('.nav-item'),
        pages: $$('.page'),
        timerDisplay: $('#timer-display'),
        clientSelect: $('#client-select'),
        hourlyRate: $('#hourly-rate'),
        startPauseButton: $('#start-pause-button'),
        stopButton: $('#stop-button'),
        clientsTableBody: $('#clients-table-body'),
        addClientButton: $('#add-client-button'),
        clientModal: $('#client-modal'),
        clientForm: $('#client-form'),
        cancelClientModal: $('#cancel-client-modal'),
        invoiceModal: $('#invoice-modal'),
        invoiceContent: $('#invoice-content'),
        toast: $('#toast-notification'),
        toastMessage: $('#toast-message'),
        setupButton: $('#setup-button'),
    };

    async function callAppsScript(action, payload) {
        const request = {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, ...payload })
        };
        try {
            const response = await fetch(SCRIPT_URL, request);
            const result = await response.json();
            if (result.status === 'success') return result;
            throw new Error(result.message);
        } catch (error) {
            showToast(`Error: ${error.message}`);
            return null;
        }
    }

    function showToast(message) {
        elements.toastMessage.textContent = message;
        elements.toast.classList.remove('opacity-0');
        setTimeout(() => elements.toast.classList.add('opacity-0'), 3000);
    }
    
    async function renderClients() {
        const result = await callAppsScript('getClients');
        if (!result) return;
        appState.clients = result.clients;
        elements.clientsTableBody.innerHTML = '';
        elements.clientSelect.innerHTML = '<option value="">Seleccionar cliente</option>';
        appState.clients.forEach(c => {
            elements.clientsTableBody.innerHTML += `<tr><td>${c.name}</td><td>${c.email}</td><td>${c.phone}</td><td><button data-id="${c.id}" class="edit-client-btn">Editar</button><button data-id="${c.id}" class="delete-client-btn">Eliminar</button></td></tr>`;
            elements.clientSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    // --- Timer Logic ---
    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function updateTimer() {
        elements.timerDisplay.textContent = formatTime(Date.now() - appState.timer.startTime + appState.timer.elapsedTime);
    }

    function startTimer() {
        if (!elements.clientSelect.value || !elements.hourlyRate.value) {
            alert('Selecciona un cliente y define una tarifa.');
            return;
        }
        appState.timer.isRunning = true;
        appState.timer.startTime = Date.now();
        appState.timer.interval = setInterval(updateTimer, 1000);
        elements.startPauseButton.textContent = 'Pausar';
        elements.stopButton.classList.remove('hidden');
    }

    function pauseTimer() {
        appState.timer.isPaused = true;
        appState.timer.isRunning = false;
        appState.timer.elapsedTime += Date.now() - appState.timer.startTime;
        clearInterval(appState.timer.interval);
        elements.startPauseButton.textContent = 'Reanudar';
    }

    function resumeTimer() {
        appState.timer.isPaused = false;
        appState.timer.isRunning = true;
        appState.timer.startTime = Date.now();
        appState.timer.interval = setInterval(updateTimer, 1000);
        elements.startPauseButton.textContent = 'Pausar';
    }

    function stopTimer() {
        const finalTime = appState.timer.elapsedTime + (appState.timer.isRunning ? Date.now() - appState.timer.startTime : 0);
        clearInterval(appState.timer.interval);
        const client = appState.clients.find(c => c.id == elements.clientSelect.value);
        const total = (finalTime / 3600000) * parseFloat(elements.hourlyRate.value);
        elements.invoiceContent.innerHTML = `<h2>Factura</h2><p>Cliente: ${client.name}</p><p>Total: $${total.toFixed(2)}</p>`;
        elements.invoiceModal.classList.remove('hidden');
        appState.timer = { interval: null, startTime: 0, elapsedTime: 0, isRunning: false, isPaused: false };
        elements.timerDisplay.textContent = '00:00:00';
        elements.startPauseButton.textContent = 'Iniciar';
        elements.stopButton.classList.add('hidden');
    }

    // --- Event Listeners ---
    elements.loginForm.addEventListener('submit', async e => {
        e.preventDefault();
        const result = await callAppsScript('login', { username: $('#username').value, password: $('#password').value });
        if (result && result.user) {
            appState.currentUser = result.user;
            elements.usernameDisplay.textContent = `Usuario: ${result.user.username}`;
            elements.loginModal.classList.add('hidden');
            elements.appContainer.classList.remove('hidden');
            renderClients();
        } else {
            showToast('Credenciales incorrectas.');
        }
    });

    elements.startPauseButton.addEventListener('click', () => {
        if (appState.timer.isRunning) pauseTimer();
        else if (appState.timer.isPaused) resumeTimer();
        else startTimer();
    });

    elements.stopButton.addEventListener('click', stopTimer);
    
    // Client CRUD events...
    // Logout, dark mode, etc.

    elements.setupButton.addEventListener('click', async () => {
        showToast('Configurando...');
        const result = await callAppsScript('setup');
        if (result) showToast(result.message);
    });
});
</script>
</body>
</html>
